appId: com.awokela.chamaeleon
productName: Chamaeleon Browser
directories:
  output: release
  buildResources: build
icon: build/icon.png
files:
  - dist-electron/**
  - package.json
# GitHub Releasesでスペースがドットに変換されるのを避けるため、成果物名は固定形式にする
artifactName: ChamaeleonBrowser-${version}-${os}-${arch}.${ext}
mac:
  category: public.app-category.developer-tools
  target: [dmg, zip]
  hardenedRuntime: false
  gatekeeperAssess: false
win:
  target: [nsis, portable, zip]
nsis:
  artifactName: ChamaeleonBrowser-${version}-win-x64-Setup.${ext}
portable:
  artifactName: ChamaeleonBrowser-${version}-win-x64-Portable.${ext}
linux:
  target: [AppImage, deb]
  category: Development
