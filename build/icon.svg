<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1512"/>
      <stop offset="1" stop-color="#0a0d0b"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ee08a"/>
      <stop offset="1" stop-color="#22a15a"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- カメレオンのピクトグラム（丸い体＋巻き尾＋目） -->
  <g fill="none" stroke="url(#grn)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <!-- 背〜頭のアーチ -->
    <path d="M300 640 Q300 360 540 360 Q700 360 720 470"/>
    <!-- 巻き尾 -->
    <path d="M300 640 Q220 700 260 780 Q300 850 400 820 Q470 800 450 720"/>
    <!-- 前脚 -->
    <path d="M470 660 L470 790 M560 660 L560 790"/>
    <!-- 舌（キャッチ） -->
    <path d="M720 470 L840 420" />
  </g>
  <!-- 目 -->
  <circle cx="648" cy="452" r="42" fill="#0a0d0b"/>
  <circle cx="648" cy="452" r="20" fill="#5ee08a"/>
  <!-- 舌先の的 -->
  <circle cx="856" cy="414" r="26" fill="url(#grn)"/>
</svg>
